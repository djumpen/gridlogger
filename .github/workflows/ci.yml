name: ci

on:
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Go test
        run: go test ./...
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Frontend install/build
        run: |
          cd frontend
          npm install
          npm run build

