name: ci-cd

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  BACKEND_IMAGE: ghcr.io/djumpen/gridlogger-backend
  FRONTEND_IMAGE: ghcr.io/djumpen/gridlogger-frontend
  K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE || 'gridlogger' }}

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Go test
        run: go test ./...

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        run: |
          cd frontend
          npm ci
          npm run build

  build-and-push:
    name: build-and-push
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          test -n "$KUBECONFIG_CONTENT"
          mkdir -p "$RUNNER_TEMP/.kube"
          printf '%s' "$KUBECONFIG_CONTENT" > "$RUNNER_TEMP/.kube/config"
          echo "KUBECONFIG=$RUNNER_TEMP/.kube/config" >> "$GITHUB_ENV"

      - name: Deploy manifests
        run: kubectl apply -k k8s/overlays/prod

      - name: Update backend image tag
        run: |
          kubectl -n "$K8S_NAMESPACE" set image deployment/backend backend="${BACKEND_IMAGE}:${GITHUB_SHA}"

      - name: Update frontend image tag
        run: |
          kubectl -n "$K8S_NAMESPACE" set image deployment/frontend frontend="${FRONTEND_IMAGE}:${GITHUB_SHA}"

      - name: Wait for backend rollout
        run: kubectl -n "$K8S_NAMESPACE" rollout status deployment/backend --timeout=180s

      - name: Wait for frontend rollout
        run: kubectl -n "$K8S_NAMESPACE" rollout status deployment/frontend --timeout=180s
