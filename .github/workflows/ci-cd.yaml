name: ci-cd

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  BACKEND_IMAGE: ghcr.io/djumpen/gridlogger-backend
  FIRMWARE_IMAGE: ghcr.io/djumpen/gridlogger-firmware
  FRONTEND_IMAGE: ghcr.io/djumpen/gridlogger-frontend
  K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE || 'gridlogger' }}

jobs:
  version:
    name: version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      build_date: ${{ steps.release.outputs.build_date }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Calculate next version
        id: release
        run: |
          VERSION="$(sh scripts/next-version.sh)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Go test
        run: go test ./...

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        run: |
          cd frontend
          npm ci
          npm run build

  build-and-push:
    name: build-and-push
    runs-on: ubuntu-latest
    needs:
      - version
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          build-args: |
            APP_VERSION=${{ needs.version.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ needs.version.outputs.build_date }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ needs.version.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push firmware image
        if: contains(github.event.head_commit.message, '--build-firmware')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.firmware
          push: true
          build-args: |
            APP_VERSION=${{ needs.version.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ needs.version.outputs.build_date }}
          tags: |
            ${{ env.FIRMWARE_IMAGE }}:${{ needs.version.outputs.version }}
            ${{ env.FIRMWARE_IMAGE }}:${{ github.sha }}
            ${{ env.FIRMWARE_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          build-args: |
            APP_VERSION=${{ needs.version.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ needs.version.outputs.build_date }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ needs.version.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

  create-release-tag:
    name: create-release-tag
    runs-on: ubuntu-latest
    needs:
      - version
      - build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Create git tag
        env:
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
        run: |
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            EXISTING_SHA="$(git rev-list -n 1 "$RELEASE_TAG")"
            if [ "$EXISTING_SHA" != "$GITHUB_SHA" ]; then
              echo "Tag $RELEASE_TAG already exists on $EXISTING_SHA" >&2
              exit 1
            fi
            echo "Tag $RELEASE_TAG already exists on current commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "release: $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs:
      - version
      - create-release-tag
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          test -n "$KUBECONFIG_CONTENT"
          mkdir -p "$RUNNER_TEMP/.kube"
          printf '%s' "$KUBECONFIG_CONTENT" > "$RUNNER_TEMP/.kube/config"
          echo "KUBECONFIG=$RUNNER_TEMP/.kube/config" >> "$GITHUB_ENV"

      - name: Deploy manifests
        run: kubectl apply -k k8s/overlays/prod

      - name: Update backend image tag
        run: |
          kubectl -n "$K8S_NAMESPACE" set image deployment/backend backend="${BACKEND_IMAGE}:${{ needs.version.outputs.version }}"
          kubectl -n "$K8S_NAMESPACE" annotate deployment/backend app.kubernetes.io/version="${{ needs.version.outputs.version }}" --overwrite

      - name: Update firmware image tag
        if: contains(github.event.head_commit.message, '--build-firmware')
        run: |
          kubectl -n "$K8S_NAMESPACE" set image deployment/firmware firmware="${FIRMWARE_IMAGE}:${{ needs.version.outputs.version }}"
          kubectl -n "$K8S_NAMESPACE" annotate deployment/firmware app.kubernetes.io/version="${{ needs.version.outputs.version }}" --overwrite

      - name: Update frontend image tag
        run: |
          kubectl -n "$K8S_NAMESPACE" set image deployment/frontend frontend="${FRONTEND_IMAGE}:${{ needs.version.outputs.version }}"
          kubectl -n "$K8S_NAMESPACE" annotate deployment/frontend app.kubernetes.io/version="${{ needs.version.outputs.version }}" --overwrite

      - name: Wait for backend rollout
        run: kubectl -n "$K8S_NAMESPACE" rollout status deployment/backend --timeout=180s

      - name: Wait for firmware rollout
        if: contains(github.event.head_commit.message, '--build-firmware')
        run: kubectl -n "$K8S_NAMESPACE" rollout status deployment/firmware --timeout=300s

      - name: Wait for frontend rollout
        run: kubectl -n "$K8S_NAMESPACE" rollout status deployment/frontend --timeout=180s
