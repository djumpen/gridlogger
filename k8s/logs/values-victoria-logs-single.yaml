server:
  fullnameOverride: victoria-logs
  retentionPeriod: 6
  persistentVolume:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
      traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
      traefik.ingress.kubernetes.io/router.middlewares: logging-victoria-logs-auth@kubernetescrd
    hosts:
      - name: logs.mylab.rest
        path:
          - /
        port: http
    tls:
      - hosts:
          - logs.mylab.rest
