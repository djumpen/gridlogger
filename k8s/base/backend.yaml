apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: gridlogger
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/djumpen/gridlogger-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: LISTEN_ADDR
          value: ":8080"
        - name: OUTAGE_THRESHOLD_SECONDS
          value: "120"
        - name: DEFAULT_PROJECT_ID
          value: "1"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: gridlogger-secrets
              key: DATABASE_URL
        - name: TEST_ENV
          valueFrom:
            secretKeyRef:
              name: gridlogger-secrets
              key: TEST_ENV
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: gridlogger-secrets
              key: TELEGRAM_BOT_TOKEN
        - name: TELEGRAM_BOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: gridlogger-secrets
              key: TELEGRAM_BOT_USERNAME
        - name: TELEGRAM_AUTH_TTL_SECONDS
          value: "86400"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: gridlogger-secrets
              key: JWT_SECRET
        - name: JWT_ISSUER
          value: "gridlogger"
        - name: SESSION_TTL_SECONDS
          value: "604800"
        - name: SESSION_COOKIE_NAME
          value: "gridlogger_session"
        - name: SESSION_COOKIE_SECURE
          value: "true"
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
